name: build-and-test-humble

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  # Upload and download actions are used since
  # gh command is't available in the docker container and
  # it's hard to setup it in the container.
  download-test-data:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Download test data
        run: |
          gh release download t4-sample-0-2026-04-22 -D tests/data/t4_sample_0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload data for build-and-test
        uses: actions/upload-artifact@v4.6.0
        with:
          name: test-data
          path: tests/data/t4_sample_0/

  build-and-test:
    needs: download-test-data
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: ros:${{ matrix.rosdistro }}
    strategy:
      matrix:
        rosdistro:
          - humble
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt update -yqq
          apt install -yqq curl python3-venv python-is-python3 \
            libgl1-mesa-dev libboost-dev ros-${ROS_DISTRO}-sensor-msgs-py ros-${ROS_DISTRO}-rosbag2-storage-mcap \
            ros-${ROS_DISTRO}-radar-msgs unzip tree rsync

      - name: Download test data
        uses: actions/download-artifact@v4.1.8
        with:
          name: test-data
          path: tests/data/t4_sample_0

      - name: Unzip test data
        run: |
          unzip 'tests/data/t4_sample_0/*.zip' -d tests/data/t4_sample_0/

      - name: Check test data
        run: |
          tree tests/data

      - name: Build autoware perception messages
        uses: autowarefoundation/autoware-github-actions/colcon-build@v1
        with:
          rosdistro: ${{ matrix.rosdistro }}
          target-packages: autoware_auto_perception_msgs autoware_perception_msgs tier4_perception_msgs vehicle_msgs
          build-depends-repos: build_depends.repos

      - name: Check python version
        run: |
          python -V

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Check uv version
        run: |
          uv --version

      - name: Install python packages
        run: |
          # use the ROS distro's system interpreter so compiled ROS modules (rclpy) import
          export UV_PYTHON="$(which python3)"
          echo "UV_PYTHON=${UV_PYTHON}" >> "$GITHUB_ENV"
          uv sync --locked

      - name: Test with pytest
        run: |
          . /opt/ros/$ROS_DISTRO/setup.sh
          . ./install/setup.sh
          uv run pytest tests -v
