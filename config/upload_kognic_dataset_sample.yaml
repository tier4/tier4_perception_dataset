task: upload_dataset
conversion:
  input_base: ./data/kognic_format_annotated
  organization_id: 114
  workspace_id: efa90d1e-99bc-4064-98bb-5bfc8758157d
  # One input is created per project. `batch` and `pre_annotation` are optional:
  #   - batch defaults to the latest open batch when omitted.
  #   - pre_annotation is a filename relative to each sequence dir; omit it to
  #     upload no pre-annotation for that batch.
  # A pre-annotation is attached to the whole scene and applied to every input
  # created from it, so projects that request the SAME pre_annotation (or both
  # omit it) share one scene, while projects requesting DIFFERENT pre-annotations
  # each get their own scene. This is why a cuboid pre-annotation cannot be shared
  # with a semseg batch.
  projects:
    - external_id: test_upload_data
      batch: test_batch
      # pre_annotation: cuboid_pre_annotation.json   # cuboids -> its own scene
    - external_id: test_upload_data
      batch: test-semseg-upload-batch        # no pre_annotation -> separate, plain scene
  target_hz: 1
  # annotation_interval_tolerance_s: 0.05  # optional leniency (+/-) when matching the target interval.
  #                                        # Defaults to half the typical source frame interval if unset.
  #                                        # Accounts for T4 frames not being spaced at exactly 1/target_hz.
  dryrun: false
  motion_compensate: false
  include_imu_data: false
  write_debug_frames: false
